trigger:
  branches:
    include:
    - main
  paths:
    include:
    - WeatherService/**

pool:
  vmImage: 'ubuntu-latest'

steps:
# 0. Clean workspace
- checkout: self
  clean: true

# 1. Publish WeatherService into a dedicated publish folder
- task: DotNetCoreCLI@2
  displayName: 'Publish WeatherService'
  inputs:
    command: 'publish'
    projects: 'WeatherService/WeatherService.csproj'
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/WeatherService/publish'

# 2. Deploy ONLY the publish folder (no wildcards)
- task: AzureWebApp@1
  displayName: 'Deploy WeatherService to grpc-weather'
  inputs:
    azureSubscription: 'AzureServiceConnection'
    appName: 'grpc-weather-service'
    appType: 'webAppLinux'
    package: '$(Build.ArtifactStagingDirectory)/WeatherService/publish'
