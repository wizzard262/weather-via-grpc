trigger:
  branches:
    include:
      - main
  paths:
    include:
      - WeatherService/**

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self
  clean: true

# 1. Publish WeatherService to ArtifactStagingDirectory
- task: DotNetCoreCLI@2
  displayName: 'Publish WeatherService (no zip)'
  inputs:
    command: 'publish'
    projects: 'WeatherService/WeatherService.csproj'
    publishWebProjects: false
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/publish'

# 2. Deploy the published folder directly (WebDeploy)
- task: AzureWebApp@1
  displayName: 'Deploy WeatherService (folder deploy)'
  inputs:
    azureSubscription: 'AzureServiceConnection'
    appName: 'grpc-weather-server'
    appType: 'webApp'
    package: '$(Build.ArtifactStagingDirectory)/publish'
