trigger:
  branches:
    include:
      - main
  paths:
    include:
      - WeatherService/**

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self
  clean: true

# 1. Publish WeatherService
- task: DotNetCoreCLI@2
  displayName: 'Publish WeatherService'
  inputs:
    command: 'publish'
    projects: 'WeatherService/WeatherService.csproj'
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/WeatherService/publish'

# 2. Create ONE zip manually
- powershell: |
    Add-Type -AssemblyName System.IO.Compression.FileSystem
    [System.IO.Compression.ZipFile]::CreateFromDirectory(
        "$(Build.ArtifactStagingDirectory)/WeatherService/publish",
        "$(Build.ArtifactStagingDirectory)/WeatherService.zip"
    )
  displayName: 'Create single ZIP'

# 3. Deploy that ONE zip
- task: AzureWebApp@1
  displayName: 'Deploy single ZIP to grpc-weather'
  inputs:
    azureSubscription: 'AzureServiceConnection'
    appName: 'grpc-weather-server'
    appType: 'webApp'
    package: '$(Build.ArtifactStagingDirectory)/WeatherService.zip'
