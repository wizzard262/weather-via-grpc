trigger:
  branches:
    include:
      - main
  paths:
    include:
      - WeatherService/**

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self
  clean: true

# 1. Publish WeatherService to a guaranteed folder
- task: DotNetCoreCLI@2
  displayName: 'Publish WeatherService (gRPC + REST)'
  inputs:
    command: 'publish'
    projects: 'WeatherService/WeatherService.csproj'
    publishWebProjects: false
    arguments: '--configuration Release --runtime win-x64 --self-contained true --output $(Build.SourcesDirectory)/publish'

# 2. Create a single ZIP from the publish folder
- powershell: |
    Add-Type -AssemblyName System.IO.Compression.FileSystem
    $source = "$(Build.SourcesDirectory)/publish"
    $zip = "$(Build.ArtifactStagingDirectory)/WeatherService.zip"

    if (!(Test-Path $source)) {
        Write-Error "Publish folder not found: $source"
        exit 1
    }

    if (Test-Path $zip) { Remove-Item $zip }

    [System.IO.Compression.ZipFile]::CreateFromDirectory($source, $zip)
  displayName: 'Create deployment ZIP'

# 3. Deploy the ZIP to Azure App Service
- task: AzureWebApp@1
  displayName: 'Deploy WeatherService ZIP to grpc-weather-server'
  inputs:
    azureSubscription: 'AzureServiceConnection'
    appName: 'grpc-weather-server'
    appType: 'webApp'
    package: '$(Build.ArtifactStagingDirectory)/WeatherService.zip'
