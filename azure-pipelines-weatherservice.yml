trigger:
  branches:
    include:
    - main
  paths:
    include:
    - WeatherService/**

pool:
  vmImage: 'ubuntu-latest'

steps:
# 0. FULL WORKSPACE CLEAN — this is the critical fix
- checkout: self
  clean: true

# 1. Publish ONLY WeatherService into its own folder
- task: DotNetCoreCLI@2
  displayName: 'Publish WeatherService'
  inputs:
    command: 'publish'
    projects: 'WeatherService/WeatherService.csproj'
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/WeatherService'

# 2. Publish ONLY that folder as the artifact
- task: PublishBuildArtifacts@1
  displayName: 'Publish WeatherService artifact'
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)/WeatherService'
    artifactName: 'weatherservice'

# 3. Deploy ONLY the WeatherService publish folder
- task: AzureWebApp@1
  displayName: 'Deploy WeatherService to grpc-weather'
  inputs:
    azureSubscription: 'AzureServiceConnection'
    appName: 'grpc-weather'
    appType: 'webAppLinux'
    package: '$(Build.ArtifactStagingDirectory)/WeatherService'
