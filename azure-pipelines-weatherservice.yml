trigger:
  branches:
    include:
    - main
  paths:
    include:
    - WeatherService/**

pool:
  vmImage: 'ubuntu-latest'

steps:
# 0. FULL WORKSPACE CLEAN
- checkout: self
  clean: true

# 1. Publish ONLY WeatherService
- task: DotNetCoreCLI@2
  displayName: 'Publish WeatherService'
  inputs:
    command: 'publish'
    projects: 'WeatherService/WeatherService.csproj'
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/WeatherService'

# 2. Deploy ONLY WeatherService (NO ARTIFACT STEP)
- task: AzureWebApp@1
  displayName: 'Deploy WeatherService to grpc-weather'
  inputs:
    azureSubscription: 'AzureServiceConnection'
    appName: 'grpc-weather'
    appType: 'webAppLinux'
    package: '$(Build.ArtifactStagingDirectory)/WeatherService'