<!DOCTYPE html>
<html>
<body>
    <h2>gRPC-Web Weather Test</h2>

    <script type="module">
        import { WeatherServiceClient } from './generated/weather_grpc_web_pb.js';
        import { WeatherRequest } from './generated/weather_pb.js';

        const serverAddress = "https://localhost:7108"
        const client = new WeatherServiceClient(serverAddress);

        const req = new WeatherRequest();
        req.setLatitude(53.41);
        req.setLongitude(-2.15);

        client.getWeather(req, {}, (err, res) => {
            if (err) {
                console.error("gRPC error:", err);
                return;
            }

            console.log("Response:", res.toObject());
            document.body.innerHTML += `<pre>${JSON.stringify(res.toObject(), null, 2)}</pre>`;
        });
    </script>

</body>
</html>
