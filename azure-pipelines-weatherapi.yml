trigger:
  branches:
    include:
    - main
  paths:
    include:
    - WeatherApi/**

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    projects: 'WeatherApi/WeatherApi.csproj'

- task: DotNetCoreCLI@2
  inputs:
    command: 'publish'
    projects: 'WeatherApi/WeatherApi.csproj'
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory) /p:ZipAfterPublish=true'

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'weatherclient'

# Deployment stage (App Service example)
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'AzureServiceConnection'
    appName: 'grpc-weather-client'
    appType: 'webAppLinux'
    package: '$(Build.ArtifactStagingDirectory)/**/*.zip'
